name: Build and deploy site

# Runs the test suite, builds the static site from the reviewed content in
# content/, and publishes it to GitHub Pages. Content is generated separately by
# the "Generate content for review" workflow, so deploy only publishes what has
# been reviewed and merged to main. Triggers: pushes to main, PRs (tests only),
# and manual dispatch.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]      # run tests on PRs; build/deploy stay main-only
  workflow_dispatch:

# Permissions required by the official GitHub Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run tests
        run: python -m pytest -q

  build:
    needs: test
    # Only build/deploy on main (push/schedule/dispatch), never on PRs.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build static site from reviewed content
        # Renders the committed Markdown in content/ (no AI/generation here).
        # If content/ is empty, run.py falls back to generating fresh.
        run: python run.py --from-content
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
